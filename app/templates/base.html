<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Lead Enrichment Local" }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell"></div>
  <header class="container app-header">
    <div class="brand-row">
      <div>
        <h1><a href="/">Lead Enrichment Local</a></h1>
        <p class="muted">Run local enrichment pipelines with transparent live progress.</p>
      </div>
      {% if debug_mode %}<span class="badge">DEBUG MODE</span>{% endif %}
    </div>
    <nav class="top-nav">
      <a href="/">Dashboard</a>
      <a href="/models">Models</a>
      <a href="/debug/llm">LLM Debug</a>
      <a href="/debug/health">System Health</a>
    </nav>
  </header>
  <main class="container page-content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
